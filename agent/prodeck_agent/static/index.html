<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1220" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>ProDeck</title>
    <script>
      // Aplica tema e cor de destaque antes do primeiro paint (evita flash).
      // Espelha o padrão de usePrefs.ts (chave "prodeck:prefs", default dark).
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem("prodeck:prefs") || "{}");
          var mode = p.theme || "dark";
          var dark =
            mode === "dark" ||
            (mode === "auto" &&
              window.matchMedia &&
              matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
          if (p.accent) document.documentElement.style.setProperty("--accent", p.accent);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0b1220" : "#eef2f7");
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-CsoT5OSG.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Bf5O3cJ1.css">

  </body>
</html>
