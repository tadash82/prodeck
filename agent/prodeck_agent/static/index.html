<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ProDeck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0b1220 radial-gradient(80% 60% at 50% 0%, #142036 0%, #0b1220 70%);
    color: #e2e8f0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2.2rem; padding: 1.5rem; touch-action: manipulation;
  }
  .status {
    display: flex; align-items: center; gap: .5rem;
    font-size: .85rem; color: #94a3b8;
    background: #0f172a; border: 1px solid #1e293b; border-radius: 999px;
    padding: .45rem 1rem;
  }
  .dot { width: .55rem; height: .55rem; border-radius: 50%; background: #64748b; transition: background .3s; }
  .status.on  .dot { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .status.off .dot { background: #ef4444; }
  button {
    width: min(70vw, 300px); aspect-ratio: 1; border: none; border-radius: 28%;
    background: linear-gradient(160deg, #2563eb, #1e40af);
    box-shadow: 0 18px 50px -12px #2563eb66, inset 0 1px 0 #ffffff2e;
    color: #fff; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .8rem;
    transition: transform .08s ease, box-shadow .3s, background .3s;
  }
  button:active { transform: scale(.94); }
  button .glyph { font-size: 3.2rem; font-weight: 700; font-family: ui-monospace, monospace; letter-spacing: -.05em; }
  button .label { font-size: 1.05rem; font-weight: 600; opacity: .92; padding: 0 1rem; }
  button.ok  { background: linear-gradient(160deg, #16a34a, #15803d); box-shadow: 0 18px 50px -12px #22c55e66; }
  button.err { background: linear-gradient(160deg, #dc2626, #991b1b); animation: shake .4s; }
  @keyframes shake { 25% { transform: translateX(-8px) } 50% { transform: translateX(8px) } 75% { transform: translateX(-5px) } }
  .meta { font-size: .8rem; color: #475569; text-align: center; line-height: 1.7; }
  .meta b { color: #94a3b8; font-weight: 600; }
</style>
</head>
<body>
  <div class="status off" id="status"><span class="dot"></span><span id="statusText">conectando…</span></div>

  <button id="btn">
    <span class="glyph">&lt;/&gt;</span>
    <span class="label">Abrir VSCode · StreamDeck</span>
  </button>

  <div class="meta">
    <div id="result">toque no botão para testar</div>
    <div>ProDeck · Fase 0 (spike) · <b id="rtt">— ms</b></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  let ws, retry = 0, seq = 0;
  const pending = new Map();

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => {
      retry = 0;
      $("status").className = "status on";
      $("statusText").textContent = "conectado";
    };
    ws.onclose = () => {
      $("status").className = "status off";
      $("statusText").textContent = "reconectando…";
      setTimeout(connect, Math.min(1000 * 2 ** retry++, 8000));
    };
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      const t0 = pending.get(msg.id);
      pending.delete(msg.id);
      const ms = t0 === undefined ? null : Math.round(performance.now() - t0);
      if (ms !== null) $("rtt").textContent = `${ms} ms`;
      if (msg.type === "action.result") {
        $("btn").className = msg.status === "ok" ? "ok" : "err";
        $("result").textContent = msg.status === "ok"
          ? `ação executada no PC em ${ms} ms ✓`
          : `erro: ${msg.message}`;
        setTimeout(() => { $("btn").className = ""; }, 900);
      }
    };
  }
  connect();

  function send(type) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const id = String(++seq);   // crypto.randomUUID exige HTTPS — contador basta aqui
    pending.set(id, performance.now());
    ws.send(JSON.stringify({ type, id }));
  }

  $("btn").addEventListener("pointerdown", () => navigator.vibrate?.(15));
  $("btn").addEventListener("click", () => send("action.trigger"));
  setInterval(() => send("ping"), 5000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && ws.readyState === WebSocket.CLOSED) connect();
  });
</script>
</body>
</html>
